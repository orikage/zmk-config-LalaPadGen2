draw_config:
  key_w: 60
  key_h: 56
  split_gap: 30
  combo_w: 28
  combo_h: 26
  footer_text: "LalaPad Gen2 — generated by <a href='https://github.com/caksoylar/keymap-drawer'>keymap-drawer</a>"
  svg_extra_style: |
    svg { background: #1a1a2e; }
    .label { fill: #e0e0e0; }
    .key { fill: #2a2a4a; stroke: #5555aa; }
    .held { fill: #3a2a5a; stroke: #7755aa; }
    .ghost { fill: #1a1a2e; stroke: #333366; }
    .combo { fill: #1a3a2a; stroke: #335533; }

parse_config:
  zmk_keycode_map:
    INT1: "英数"
    INT5: "かな"
    LG(TAB): "⊞+Tab"
    LG(D): "⊞+D"
    LC(LG(LEFT)): "⊞←"
    LC(LG(RIGHT)): "⊞→"
    LWIN: "⊞"
  zmk_preamble: |
    #define DEFAULT_LAYER   0
    #define SECONDARY_LAYER 1
    #define TERTIARY_LAYER  2
    #define SYSTEM_LAYER    3
